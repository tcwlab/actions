# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / actions — CI
#
# No Docker build/publish — this is a composite-actions repo, not an image.
# Just lint everything (Markdown, YAML, action.yml syntax) and let the
# Release pipeline handle tagging.
#
# Image: tcwlab/betterlint (multi-linter wrapper).
# Checkout: tcwlab/actions/checkout-shell@v1 (dogfooding our own action).
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main, "feature/*", "claude/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BETTERLINT_VERSION: "2.17.1"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      - uses: https://github.com/tcwlab/actions/.forgejo/actions/checkout-shell@v1
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Run all matching linters
        run: betterlint --dir .

  action-yml-syntax:
    name: action.yml syntax smoke-test
    runs-on: ubuntu-22.04
    needs: lint
    container:
      image: alpine:3.23
    steps:
      - name: Install git + python
        run: apk add --no-cache git python3 py3-yaml
      - uses: https://github.com/tcwlab/actions/.forgejo/actions/checkout-shell@v1
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Validate every action.yml under .forgejo/actions/
        run: |
          set -eu
          fail=0
          for f in $(find .forgejo/actions -name 'action.yml' 2>/dev/null); do
            echo "--- $f ---"
            python3 -c "
          import sys, yaml
          with open('$f') as fh: d = yaml.safe_load(fh)
          assert isinstance(d, dict), 'top-level must be a mapping'
          assert 'name' in d, 'missing: name'
          assert 'description' in d, 'missing: description'
          assert 'runs' in d, 'missing: runs'
          assert d['runs'].get('using') in ('composite','node20','docker'), 'runs.using must be composite/node20/docker'
          if d['runs'].get('using') == 'composite':
              assert isinstance(d['runs'].get('steps'), list), 'composite needs runs.steps as list'
          print('  ✓ valid')
          " || fail=1
          done
          [ "$fail" = "0" ]
