# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / actions — Semantic Release + Major-Tag-Update
#
# Runs only on main. Analyses Conventional Commits since the last tag,
# creates a Forgejo release with changelog, then force-moves the major
# tag (v<MAJOR>) to the new commit so that consumers pinned at @v1 etc.
# automatically pick up patch and minor releases.
#
# Plugins (semantic-release):
#   @semantic-release/commit-analyzer
#   @semantic-release/release-notes-generator
#   @saithodev/semantic-release-gitea     → Forgejo release
#   @semantic-release/git                 → push the git tag
#
# Required secrets: FORGEJO_TOKEN (user PAT with repo + workflow rights)
# ─────────────────────────────────────────────────────────────────────────────

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  release:
    name: Semantic Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: https://github.com/tcwlab/actions/.forgejo/actions/checkout-shell@v1
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
          fetch-depth: "0"

      - name: Remember tag before release
        id: before
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITEA_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITEA_URL: "https://git.mon.k8b.co"
          GIT_AUTHOR_NAME: "Sascha Willomitzer"
          GIT_AUTHOR_EMAIL: "swi@thechameleonway.com"
          GIT_COMMITTER_NAME: "Sascha Willomitzer"
          GIT_COMMITTER_EMAIL: "swi@thechameleonway.com"
        run: |
          npm install --no-save \
            semantic-release@24 \
            "@semantic-release/commit-analyzer@13" \
            "@semantic-release/release-notes-generator@14" \
            "@saithodev/semantic-release-gitea@2" \
            "@semantic-release/git@10"
          npx semantic-release

      - name: Detect new tag
        id: after
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Force-move major tag to new release
        if: steps.after.outputs.tag != steps.before.outputs.tag && steps.after.outputs.tag != ''
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_TAG: ${{ steps.after.outputs.tag }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error

          token   = os.environ["FORGEJO_TOKEN"]
          repo    = os.environ["REPO"]
          new_tag = os.environ["NEW_TAG"]
          api     = "https://git.mon.k8b.co/api/v1"
          hdrs    = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          # Extract major: v1.2.3 → v1
          m = re.match(r"^(v\d+)\.\d+\.\d+", new_tag)
          if not m:
              print(f"Tag {new_tag} does not look like vMAJOR.MINOR.PATCH — skipping major-tag move")
              raise SystemExit(0)
          major = m.group(1)
          print(f"Major tag to move: {major} → new release {new_tag}")

          # Resolve the SHA the new full tag points to
          req = urllib.request.Request(
              f"{api}/repos/{repo}/tags/{new_tag}", headers=hdrs)
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          sha = data["id"]
          print(f"New release tag {new_tag} → {sha[:7]}")

          # Delete old major tag (ignore 404)
          req = urllib.request.Request(
              f"{api}/repos/{repo}/tags/{major}", headers=hdrs, method="DELETE")
          try:
              with urllib.request.urlopen(req) as r:
                  print(f"Deleted old {major} (HTTP {r.status})")
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print(f"Old {major} did not exist — fresh create")
              else:
                  raise

          # Re-create major tag at new SHA
          body = json.dumps({
              "tag_name": major,
              "target": sha,
              "message": f"Rolling major tag — points at {new_tag}"
          }).encode()
          req = urllib.request.Request(
              f"{api}/repos/{repo}/tags", data=body, headers=hdrs, method="POST")
          with urllib.request.urlopen(req) as r:
              print(f"Re-created {major} → {sha[:7]} (HTTP {r.status})")
          PYEOF
